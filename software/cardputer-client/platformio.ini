[platformio]
default_envs = m5stack-cardputer

[env:m5stack-cardputer]
platform = espressif32@~6.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5Cardputer
    bblanchon/ArduinoJson @ ^7.1.0
upload_speed = 1500000
build_unflags =
    -std=gnu++17


[env:m5stack-cardputer-debug]
extends = env:m5stack-cardputer
build_flags =
    ${env:m5stack-cardputer.build_flags}
    -DDEBUG_CARDPUTER_CLIENT
upload_protocol = espota
